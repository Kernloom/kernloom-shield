name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install BPF toolchain
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build userspace
        run: make build

      - name: Build BPF object
        run: make bpf
