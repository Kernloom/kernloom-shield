name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install BPF toolchain
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Build release artifacts
        run: make dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/klshield dist/xdp_kernloom_shield.bpf.o --generate-notes
