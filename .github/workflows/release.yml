name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install BPF toolchain
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Build release artifacts
        run: make dist checksums release-provenance

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/kernloom-shield.spdx.json

      - name: Sign release checksums
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt

      - name: Sign SBOM
        run: cosign sign-blob --yes --output-signature dist/kernloom-shield.spdx.json.sig --output-certificate dist/kernloom-shield.spdx.json.pem dist/kernloom-shield.spdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
